name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - develop
      - feature/**

concurrency:
  group: ${{format('{0}:{1}', github.repository, github.ref)}}
  cancel-in-progress: true

env:
  GIT_FETCH_JOBS: 8
  NET_RETRY_COUNT: 5
  DEFAULT_BUILD_VARIANT: debug,release

jobs:
  posix:
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux, gcc
          - toolset: gcc-4.8
            cxxstd: "11"
            extra_tests: 1
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - g++-4.8
          - toolset: gcc-4.9
            cxxstd: "11"
            os: ubuntu-latest
            container: ubuntu:16.04
            install:
              - g++-4.9
          - toolset: gcc-5
            cxxstd: "11,14,1z"
            os: ubuntu-latest
            container: ubuntu:16.04
            install:
              - g++-5
          - toolset: gcc-6
            cxxstd: "11,14,1z"
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - g++-6
          - toolset: gcc-7
            cxxstd: "11,14,17"
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - g++-7
          - toolset: gcc-8
            cxxstd: "14,17,2a"
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - g++-8
          - toolset: gcc-9
            cxxstd: "14,17,2a"
            os: ubuntu-latest
            container: ubuntu:20.04
            install:
              - g++-9
          - toolset: gcc-10
            cxxstd: "14,17,20"
            os: ubuntu-latest
            container: ubuntu:20.04
            install:
              - g++-10
          - toolset: gcc-11
            cxxstd: "14-gnu,17-gnu"
            os: ubuntu-latest
            container: ubuntu:22.04
            install:
              - g++-11
          - toolset: gcc-11
            cxxstd: "20-gnu,23-gnu"
            os: ubuntu-latest
            container: ubuntu:22.04
            install:
              - g++-11
          - toolset: gcc-12
            cxxstd: "14-gnu,17-gnu"
            os: ubuntu-latest
            container: ubuntu:22.04
            install:
              - g++-12
          - toolset: gcc-12
            cxxstd: "20-gnu,23-gnu"
            os: ubuntu-latest
            container: ubuntu:22.04
            install:
              - g++-12
          - toolset: gcc-13
            cxxstd: "14-gnu,17-gnu"
            os: ubuntu-24.04
            install:
              - g++-13
          - toolset: gcc-13
            cxxstd: "20-gnu,23-gnu"
            os: ubuntu-24.04
            install:
              - g++-13
          - toolset: gcc-14
            cxxstd: "14-gnu,17-gnu,20-gnu"
            os: ubuntu-24.04
            install:
              - g++-14
          - toolset: gcc-14
            cxxstd: "23-gnu,26-gnu"
            os: ubuntu-24.04
            install:
              - g++-14
          - toolset: gcc-15
            cxxstd: "14-gnu,17-gnu,20-gnu"
            os: ubuntu-26.04
            install:
              - g++-15
          - toolset: gcc-15
            cxxstd: "23-gnu,26-gnu"
            os: ubuntu-26.04
            install:
              - g++-15
          - toolset: gcc-16
            cxxstd: "14-gnu,17-gnu,20-gnu"
            os: ubuntu-26.04
            install:
              - g++-16
          - toolset: gcc-16
            cxxstd: "23-gnu,26-gnu"
            os: ubuntu-26.04
            install:
              - g++-16
          - name: UBSAN
            toolset: gcc-15
            cxxstd: "14-gnu,17-gnu,20-gnu,23-gnu,26-gnu"
            ubsan: 1
            build_variant: debug
            os: ubuntu-26.04
            install:
              - g++-15

          # Linux, clang
          - toolset: clang
            compiler: clang++-3.7
            cxxstd: "11,14"
            os: ubuntu-latest
            container: ubuntu:16.04
            install:
              - clang-3.7
          - toolset: clang
            compiler: clang++-3.8
            cxxstd: "11,14"
            os: ubuntu-latest
            container: ubuntu:16.04
            install:
              - clang-3.8
          - toolset: clang
            compiler: clang++-3.9
            cxxstd: "11,14"
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - clang-3.9
          - toolset: clang
            compiler: clang++-4.0
            cxxstd: "11,14"
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - clang-4.0
          - toolset: clang
            compiler: clang++-5.0
            cxxstd: "14,1z"
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - clang-5.0
          - toolset: clang
            compiler: clang++-6.0
            cxxstd: "14,17"
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - clang-6.0
          - toolset: clang
            compiler: clang++-7
            cxxstd: "14,17"
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - clang-7
          # Note: clang-8 does not fully support C++20, so it is not compatible with libstdc++-8 in this mode
          - toolset: clang
            compiler: clang++-8
            cxxstd: "14,17,2a"
            os: ubuntu-latest
            container: ubuntu:18.04
            install:
              - clang-8
              - g++-7
            gcc_toolchain: 7
          - toolset: clang
            compiler: clang++-9
            cxxstd: "14,17,2a"
            os: ubuntu-latest
            container: ubuntu:20.04
            install:
              - clang-9
          - toolset: clang
            compiler: clang++-10
            cxxstd: "14,17,20"
            os: ubuntu-latest
            container: ubuntu:20.04
            install:
              - clang-10
          - toolset: clang
            compiler: clang++-11
            cxxstd: "14,17,20"
            os: ubuntu-latest
            container: ubuntu:22.04
            install:
              - clang-11
              - g++-11
            gcc_toolchain: 11
          - toolset: clang
            compiler: clang++-12
            cxxstd: "17-gnu,20-gnu,2b-gnu"
            os: ubuntu-latest
            container: ubuntu:22.04
            install:
              - clang-12
              - g++-11
            gcc_toolchain: 11
          - toolset: clang
            compiler: clang++-13
            cxxstd: "17-gnu,20-gnu,2b-gnu"
            os: ubuntu-latest
            container: ubuntu:22.04
            install:
              - clang-13
              - g++-11
            gcc_toolchain: 11
          - toolset: clang
            compiler: clang++-14
            cxxstd: "17-gnu,20-gnu,2b-gnu"
            os: ubuntu-latest
            container: ubuntu:22.04
            install:
              - clang-14
              - g++-11
            gcc_toolchain: 11
          - toolset: clang
            compiler: clang++-15
            cxxstd: "17-gnu,20-gnu,2b-gnu"
            os: ubuntu-latest
            container: ubuntu:22.04
            install:
              - clang-15
              - g++-11
            gcc_toolchain: 11
          - toolset: clang
            compiler: clang++-16
            cxxstd: "17-gnu,20-gnu,2b-gnu"
            os: ubuntu-24.04
            install:
              - clang-16
              - g++-11
            gcc_toolchain: 11
          - toolset: clang
            compiler: clang++-17
            cxxstd: "17-gnu,20-gnu,23-gnu"
            os: ubuntu-24.04
            install:
              - clang-17
              - g++-11
            gcc_toolchain: 11
          - toolset: clang
            compiler: clang++-18
            cxxstd: "17-gnu,20-gnu"
            os: ubuntu-24.04
            install:
              - clang-18
              - g++-13
          - toolset: clang
            compiler: clang++-18
            cxxstd: "23-gnu,26-gnu"
            os: ubuntu-24.04
            install:
              - clang-18
              - g++-13
          - toolset: clang
            compiler: clang++-19
            cxxstd: "17-gnu,20-gnu"
            os: ubuntu-24.04
            install:
              - clang-19
          - toolset: clang
            compiler: clang++-19
            cxxstd: "23-gnu,26-gnu"
            os: ubuntu-24.04
            install:
              - clang-19
          - toolset: clang
            compiler: clang++-20
            cxxstd: "17-gnu,20-gnu"
            os: ubuntu-26.04
            install:
              - clang-20
          - toolset: clang
            compiler: clang++-20
            cxxstd: "23-gnu,26-gnu"
            os: ubuntu-26.04
            install:
              - clang-20
          - toolset: clang
            compiler: clang++-21
            cxxstd: "17-gnu,20-gnu"
            os: ubuntu-26.04
            install:
              - clang-21
          - toolset: clang
            compiler: clang++-21
            cxxstd: "23-gnu,26-gnu"
            os: ubuntu-26.04
            install:
              - clang-21
          - toolset: clang
            compiler: clang++-22
            cxxstd: "17-gnu,20-gnu"
            os: ubuntu-26.04
            install:
              - clang-22
          - toolset: clang
            compiler: clang++-22
            cxxstd: "23-gnu,26-gnu"
            os: ubuntu-26.04
            install:
              - clang-22
          - toolset: clang
            compiler: clang++-22
            cxxstd: "11-gnu,14-gnu"
            cxxflags: -stdlib=libc++
            linkflags: -stdlib=libc++
            extra_tests: 1
            os: ubuntu-26.04
            install:
              - clang-22
              - libc++-22-dev
              - libc++abi-22-dev
          - toolset: clang
            compiler: clang++-22
            cxxstd: "17-gnu,20-gnu"
            cxxflags: -stdlib=libc++
            linkflags: -stdlib=libc++
            os: ubuntu-26.04
            install:
              - clang-22
              - libc++-22-dev
              - libc++abi-22-dev
          - toolset: clang
            compiler: clang++-22
            cxxstd: "23-gnu,26-gnu"
            cxxflags: -stdlib=libc++
            linkflags: -stdlib=libc++
            os: ubuntu-26.04
            install:
              - clang-22
              - libc++-22-dev
              - libc++abi-22-dev
          - name: UBSAN
            toolset: clang
            compiler: clang++-22
            cxxstd: "17-gnu,20-gnu,23-gnu,26-gnu"
            cxxflags: -stdlib=libc++
            linkflags: "-stdlib=libc++ -lubsan"
            ubsan: 1
            build_variant: debug
            os: ubuntu-26.04
            install:
              - clang-22
              - libc++-22-dev
              - libc++abi-22-dev

          - toolset: clang
            vm: freebsd
            version: "14.3"
            cxxstd: "11,14"
            extra_tests: 1
            build_variant: debug
            os: ubuntu-latest
          - toolset: clang
            vm: freebsd
            version: "14.3"
            cxxstd: "17,20,23,26"
            build_variant: debug
            os: ubuntu-latest

          - toolset: clang
            vm: openbsd
            version: "7.7"
            cxxstd: "11,14"
            extra_tests: 1
            build_variant: debug
            os: ubuntu-latest
          - toolset: clang
            vm: openbsd
            version: "7.7"
            cxxstd: "17,20,2b"
            build_variant: debug
            os: ubuntu-latest

          - toolset: gcc
            vm: netbsd
            version: "10.1"
            cxxstd: "11"
            extra_tests: 1
            build_variant: debug
            os: ubuntu-latest
          - toolset: gcc
            vm: netbsd
            version: "10.1"
            cxxstd: "14,17,20"
            build_variant: debug
            os: ubuntu-latest

          - toolset: gcc
            vm: dragonflybsd
            version: "6.4.0"
            cxxstd: "11"
            extra_tests: 1
            build_variant: debug
            os: ubuntu-latest
            lang: en_US.UTF-8
          - toolset: gcc
            vm: dragonflybsd
            version: "6.4.0"
            cxxstd: "14,17,2a"
            build_variant: debug
            os: ubuntu-latest
            lang: en_US.UTF-8

          - toolset: gcc
            vm: solaris
            version: "11.4-gcc"
            cxxstd: "11,14"
            cxxflags: -D__SunOS_5_11
            extra_tests: 1
            build_variant: debug
            os: ubuntu-latest
          - toolset: gcc
            vm: solaris
            version: "11.4-gcc"
            cxxstd: "17,20,23,26"
            cxxflags: -D__SunOS_5_11
            build_variant: debug
            os: ubuntu-latest

          - toolset: gcc
            vm: omnios
            version: "r151056-build"
            cxxstd: "11,14"
            extra_tests: 1
            build_variant: debug
            os: ubuntu-latest
          - toolset: gcc
            vm: omnios
            version: "r151056-build"
            cxxstd: "17,20"
            build_variant: debug
            os: ubuntu-latest
          - toolset: gcc
            vm: omnios
            version: "r151056-build"
            cxxstd: "23,26"
            build_variant: debug
            os: ubuntu-latest

          - toolset: gcc
            vm: openindiana
            version: "202510-build"
            cxxstd: "11,14"
            extra_tests: 1
            build_variant: debug
            os: ubuntu-latest
          - toolset: gcc
            vm: openindiana
            version: "202510-build"
            cxxstd: "17,20"
            build_variant: debug
            os: ubuntu-latest
          - toolset: gcc
            vm: openindiana
            version: "202510-build"
            cxxstd: "23,26"
            build_variant: debug
            os: ubuntu-latest

          - toolset: clang
            os: macos-14
            cxxstd: "11"
            extra_tests: 1
            build_variant: debug
          - toolset: clang
            os: macos-14
            cxxstd: "14,17,20,2b"
            build_variant: debug
          - toolset: clang
            os: macos-15
            cxxstd: "14,17,20,23,26"
            build_variant: debug
          - toolset: clang
            os: macos-26
            cxxstd: "14,17,20,23,26"
            build_variant: debug

    timeout-minutes: 150
    runs-on: ${{matrix.os}}
    container: ${{matrix.container}}

    steps:
      - name: Setup environment
        run: |
            if [ -n "${{matrix.lang}}" ]
            then
                echo "LANG=${{matrix.lang}}" >> $GITHUB_ENV
                export LANG=${{matrix.lang}}
            fi
            if [ -f "/etc/debian_version" ]
            then
                echo "DEBIAN_FRONTEND=noninteractive" >> $GITHUB_ENV
                export DEBIAN_FRONTEND=noninteractive
            fi
            if [ -n "${{matrix.container}}" ]
            then
                echo "GHA_CONTAINER=${{matrix.container}}" >> $GITHUB_ENV
                if [ -f "/etc/debian_version" ]
                then
                    # Use Azure APT mirrors in containers to avoid HTTP errors due to DDoS filters triggered by lots of CI jobs launching concurrently.
                    # Note that not all Ubuntu versions support "mirror+file:..." URIs in APT sources, so just use Azure mirrors exclusively.
                    # Note also that on recent Ubuntu versions DEB822 format is used for source files.
                    APT_SOURCES=()
                    if [ -d "/etc/apt/sources.list.d" ]
                    then
                        readarray -t APT_SOURCES < <(find "/etc/apt/sources.list.d" -type f -name '*.sources' -print)
                    fi
                    if [ -f "/etc/apt/sources.list" ]
                    then
                        APT_SOURCES+=("/etc/apt/sources.list")
                    fi
                    if [ "${#APT_SOURCES[@]}" -gt 0 ]
                    then
                        sed -i -E -e 's!([^ ]+) (http|https)://(archive|security)\.ubuntu\.com/ubuntu[^ ]*(.*)!\1 http://azure.archive.ubuntu.com/ubuntu/\4!' "${APT_SOURCES[@]}"
                    fi
                    apt-get -o Acquire::Retries=$NET_RETRY_COUNT update
                    if [ "$(apt-cache search "^python-is-python3$" | wc -l)" -ne 0 ]
                    then
                        PYTHON_PACKAGE="python-is-python3"
                    else
                        PYTHON_PACKAGE="python"
                    fi
                    apt-get -o Acquire::Retries=$NET_RETRY_COUNT install -y sudo software-properties-common tzdata wget curl apt-transport-https ca-certificates make build-essential g++ $PYTHON_PACKAGE python3 perl git cmake
                fi
            fi
            git config --global pack.threads 0

      - name: Install packages
        if: matrix.install
        run: |
            declare -a SOURCE_KEYS SOURCES
            if [ -n "${{join(matrix.source_keys, ' ')}}" ]
            then
                SOURCE_KEYS=("${{join(matrix.source_keys, '" "')}}")
            fi
            if [ -n "${{join(matrix.sources, ' ')}}" ]
            then
                SOURCES=("${{join(matrix.sources, '" "')}}")
            fi
            for key in "${SOURCE_KEYS[@]}"
            do
                for i in {1..$NET_RETRY_COUNT}
                do
                    echo "Adding key: $key"
                    wget -O - "$key" | sudo apt-key add - && break || sleep 2
                done
            done
            if [ ${#SOURCES[@]} -gt 0 ]
            then
                APT_ADD_REPO_COMMON_ARGS=("-y")
                APT_ADD_REPO_SUPPORTED_ARGS="$(apt-add-repository --help | perl -ne 'if (/^\s*-n/) { print "n"; } elsif (/^\s*-P/) { print "P"; } elsif (/^\s*-S/) { print "S"; } elsif (/^\s*-U/) { print "U"; }')"
                if [ -n "$APT_ADD_REPO_SUPPORTED_ARGS" -a -z "${APT_ADD_REPO_SUPPORTED_ARGS##*n*}" ]
                then
                    APT_ADD_REPO_COMMON_ARGS+=("-n")
                fi
                APT_ADD_REPO_HAS_SOURCE_ARGS="$([ -n "$APT_ADD_REPO_SUPPORTED_ARGS" -a -z "${APT_ADD_REPO_SUPPORTED_ARGS##*P*}" -a -z "${APT_ADD_REPO_SUPPORTED_ARGS##*S*}" -a -z "${APT_ADD_REPO_SUPPORTED_ARGS##*U*}" ] && echo 1 || echo 0)"
                for source in "${SOURCES[@]}"
                do
                    for i in {1..$NET_RETRY_COUNT}
                    do
                        APT_ADD_REPO_ARGS=("${APT_ADD_REPO_COMMON_ARGS[@]}")
                        if [ $APT_ADD_REPO_HAS_SOURCE_ARGS -ne 0 ]
                        then
                            case "$source" in
                            "ppa:"*)
                                APT_ADD_REPO_ARGS+=("-P")
                                ;;
                            "deb "*)
                                APT_ADD_REPO_ARGS+=("-S")
                                ;;
                            *)
                                APT_ADD_REPO_ARGS+=("-U")
                                ;;
                            esac
                        fi
                        APT_ADD_REPO_ARGS+=("$source")
                        echo "apt-add-repository ${APT_ADD_REPO_ARGS[@]}"
                        sudo -E apt-add-repository "${APT_ADD_REPO_ARGS[@]}" && break || sleep 2
                    done
                done
            fi
            sudo apt-get -o Acquire::Retries=$NET_RETRY_COUNT update
            sudo apt-get -o Acquire::Retries=$NET_RETRY_COUNT install -y ${{join(matrix.install, ' ')}}

      - name: Setup GCC Toolchain
        if: matrix.gcc_toolchain
        run: |
            GCC_TOOLCHAIN_ROOT="$HOME/gcc-toolchain"
            echo "GCC_TOOLCHAIN_ROOT=\"$GCC_TOOLCHAIN_ROOT\"" >> $GITHUB_ENV
            MULTIARCH_TRIPLET="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
            mkdir -p "$GCC_TOOLCHAIN_ROOT"
            ln -s /usr/include "$GCC_TOOLCHAIN_ROOT/include"
            ln -s /usr/bin "$GCC_TOOLCHAIN_ROOT/bin"
            mkdir -p "$GCC_TOOLCHAIN_ROOT/lib/gcc/$MULTIARCH_TRIPLET"
            ln -s "/usr/lib/gcc/$MULTIARCH_TRIPLET/${{matrix.gcc_toolchain}}" "$GCC_TOOLCHAIN_ROOT/lib/gcc/$MULTIARCH_TRIPLET/${{matrix.gcc_toolchain}}"

      - name: Setup Boost
        run: |
            echo GITHUB_REPOSITORY: $GITHUB_REPOSITORY
            LIBRARY=${GITHUB_REPOSITORY#*/}
            echo LIBRARY: $LIBRARY
            echo "LIBRARY=$LIBRARY" >> $GITHUB_ENV
            echo GITHUB_BASE_REF: $GITHUB_BASE_REF
            echo GITHUB_REF: $GITHUB_REF
            REF=${GITHUB_BASE_REF:-$GITHUB_REF}
            REF=${REF#refs/heads/}
            echo REF: $REF
            BOOST_BRANCH=develop && [ "$REF" = "master" ] && BOOST_BRANCH=master || true
            echo BOOST_BRANCH: $BOOST_BRANCH
            BUILD_JOBS=$((nproc || sysctl -n hw.ncpu) 2> /dev/null)
            echo "BUILD_JOBS=$BUILD_JOBS" >> $GITHUB_ENV
            echo "CMAKE_BUILD_PARALLEL_LEVEL=$BUILD_JOBS" >> $GITHUB_ENV
            echo BUILD_JOBS: $BUILD_JOBS
            declare -a DEPINST_ARGS=()
            GIT_VERSION="$(git --version | sed -e 's/git version //')"
            GIT_HAS_JOBS=1
            if [ -f "/etc/debian_version" ]
            then
                if $(dpkg --compare-versions "$GIT_VERSION" lt 2.8.0)
                then
                    GIT_HAS_JOBS=0
                fi
            else
                declare -a GIT_VER=(${GIT_VERSION//./ })
                declare -a GIT_MIN_VER=(2 8 0)
                for ((i=0; i<${#GIT_VER[@]}; i++))
                do
                    if [ -z "${GIT_MIN_VER[i]}" ]
                    then
                        GIT_MIN_VER[i]=0
                    fi
                    if [ "${GIT_VER[i]}" -lt "${GIT_MIN_VER[i]}" ]
                    then
                        GIT_HAS_JOBS=0
                        break
                    fi
                done
            fi
            if [ "$GIT_HAS_JOBS" -ne 0 ]
            then
                DEPINST_ARGS+=("--git_args" "--jobs $GIT_FETCH_JOBS")
            fi
            mkdir -p snapshot
            cd snapshot
            echo "Downloading library snapshot: https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz"
            curl -L --retry "$NET_RETRY_COUNT" -o "${LIBRARY}-${GITHUB_SHA}.tar.gz" "https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz"
            tar -xf "${LIBRARY}-${GITHUB_SHA}.tar.gz"
            if [ ! -d "${LIBRARY}-${GITHUB_SHA}" ]
            then
                echo "Library snapshot does not contain the library directory ${LIBRARY}-${GITHUB_SHA}:"
                ls -la
                exit 1
            fi
            rm -f "${LIBRARY}-${GITHUB_SHA}.tar.gz"
            cd ..
            git clone -b "$BOOST_BRANCH" --depth 1 "https://github.com/boostorg/boost.git" "boost-root"
            cd boost-root
            mkdir -p libs
            rm -rf "libs/$LIBRARY"
            mv -f "../snapshot/${LIBRARY}-${GITHUB_SHA}" "libs/$LIBRARY"
            rm -rf "../snapshot"
            git submodule update --init tools/boostdep
            DEPINST_ARGS+=("$LIBRARY")
            python tools/boostdep/depinst/depinst.py "${DEPINST_ARGS[@]}"
            rm -rf ".git"
            cd ..
            cat > b2-run-tests.sh << "EOF"
            #!/usr/bin/env bash
            set -e
            cd boost-root
            ./bootstrap.sh
            ./b2 headers
            if [ -n "${{matrix.compiler}}" -o -n "$GCC_TOOLCHAIN_ROOT" ]
            then
                echo -n "using ${{matrix.toolset}} : : ${{matrix.compiler}}" > ~/user-config.jam
                if [ -n "$GCC_TOOLCHAIN_ROOT" ]
                then
                    echo -n " : <compileflags>\"--gcc-toolchain=$GCC_TOOLCHAIN_ROOT\" <linkflags>\"--gcc-toolchain=$GCC_TOOLCHAIN_ROOT\"" >> ~/user-config.jam
                fi
                echo " ;" >> ~/user-config.jam
            fi
            if [ -z "${{matrix.extra_tests}}" ]
            then
                export BOOST_THREAD_TEST_WITHOUT_SELF_CONTAINED_HEADER_TESTS=1
            fi
            declare -a B2_ARGS=("-j" "$BUILD_JOBS" "toolset=${{matrix.toolset}}" "cxxstd=${{matrix.cxxstd}}")
            if [ -n "${{matrix.build_variant}}" ]
            then
                B2_ARGS+=("variant=${{matrix.build_variant}}")
            else
                B2_ARGS+=("variant=$DEFAULT_BUILD_VARIANT")
            fi
            if [ -n "${{matrix.threading}}" ]
            then
                B2_ARGS+=("threading=${{matrix.threading}}")
